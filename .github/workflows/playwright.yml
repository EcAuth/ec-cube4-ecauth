name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          STAGING_CLIENT_ID: op://EcAuth/ecauth-staging-app/client_id
          STAGING_CLIENT_SECRET: op://EcAuth/ecauth-staging-app/client_secret
          STAGING_WEB_APP_SUFFIX: op://EcAuth/ecauth-staging-app/web_app_suffix

      - name: Start Docker environment
        run: docker compose up -d --build --wait

      - name: Wait for EC-CUBE to be ready
        run: |
          ready=false
          for i in $(seq 1 30); do
            if curl -sk https://localhost:8081/admin/login > /dev/null 2>&1; then
              echo "EC-CUBE is ready"
              ready=true
              break
            fi
            echo "Waiting for EC-CUBE... ($i/30)"
            sleep 5
          done
          if [ "$ready" != "true" ]; then
            echo "EC-CUBE did not become ready in time" >&2
            exit 1
          fi

      - name: Run Playwright tests
        run: pnpm exec playwright test --reporter=list
        env:
          BASE_URL: https://localhost:8081
          ECAUTH_BASE_URL: https://ecauth-staging-${{ env.STAGING_WEB_APP_SUFFIX }}.azurewebsites.net
          CLIENT_ID: ${{ env.STAGING_CLIENT_ID }}
          CLIENT_SECRET: ${{ env.STAGING_CLIENT_SECRET }}
          RP_ID: localhost

      - name: Dump dtb_member on failure
        if: failure()
        run: |
          echo "=== dtb_member (id, login_id, ecauth_subject) ==="
          docker compose exec -T postgres psql -U eccube -d eccube_db -c \
            "SELECT id, login_id, ecauth_subject FROM dtb_member ORDER BY id;" || true

      - name: Collect EC-CUBE logs
        if: failure()
        run: |
          mkdir -p ec-cube-logs
          docker compose logs --no-color ec-cube > ec-cube-logs/ec-cube-stdout.log 2>&1 || true
          docker compose logs --no-color postgres > ec-cube-logs/postgres-stdout.log 2>&1 || true
          docker compose cp ec-cube:/var/www/html/var/log ec-cube-logs/var-log 2>/dev/null || true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
            ec-cube-logs/
          retention-days: 7

      - name: Stop Docker environment
        if: always()
        run: docker compose down
