name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Create .env file
        run: |
          cat <<'EOF' > .env
          ECAUTH_BASE_URL=${{ secrets.ECAUTH_BASE_URL }}
          ECAUTH_CLIENT_ID=${{ secrets.ECAUTH_CLIENT_ID }}
          ECAUTH_CLIENT_SECRET=${{ secrets.ECAUTH_CLIENT_SECRET }}
          EOF

      - name: Start Docker environment
        run: docker compose up -d --build --wait

      - name: Wait for EC-CUBE to be ready
        run: |
          ready=false
          for i in $(seq 1 30); do
            if curl -sk https://localhost:8081/admin/login > /dev/null 2>&1; then
              echo "EC-CUBE is ready"
              ready=true
              break
            fi
            echo "Waiting for EC-CUBE... ($i/30)"
            sleep 5
          done
          if [ "$ready" != "true" ]; then
            echo "EC-CUBE did not become ready in time" >&2
            exit 1
          fi

      - name: Run Playwright tests
        run: pnpm exec playwright test --reporter=list
        env:
          BASE_URL: https://localhost:8081

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Stop Docker environment
        if: always()
        run: docker compose down
